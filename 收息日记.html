<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股息追踪 · Portfolio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f6;
    --card: #ffffff;
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --primary-dark: #1e40af;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --warning: #ca8a04;
    --warning-bg: #fefce8;
    --danger: #ef4444;
    --danger-bg: #fef2f2;
    --muted-text: #6b7280;
    --text: #111827;
    --text-secondary: #4b5563;
    --border: #e5e7eb;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
    --radius: 10px;
    --radius-sm: 6px;
    --font: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #1d4ed8 100%);
    color: #fff; padding: 0;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 2px 20px rgba(37,99,235,0.25);
  }
  .header-inner {
    max-width: 1300px; margin: 0 auto;
    padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 {
    font-size: 20px; font-weight: 600; letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 10px;
  }
  .header h1 .logo-icon {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.15); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; backdrop-filter: blur(4px);
  }
  .header-sub { font-size: 13px; opacity: 0.7; font-weight: 400; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .container { max-width: 1300px; margin: 0 auto; padding: 24px 28px; }

  .btn {
    padding: 9px 20px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 1px 3px rgba(37,99,235,0.25); }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
  .btn-ghost { background: transparent; color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.2); padding: 6px 14px; font-size: 12px; font-weight: 500; }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .btn-secondary { background: #f3f4f6; color: var(--text-secondary); padding: 6px 14px; font-size: 12px; font-weight: 500; }
  .btn-secondary:hover { background: #e5e7eb; }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-icon { width: 32px; height: 32px; padding: 0; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--muted-text); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 16px; }
  .btn-icon:hover { background: #fef2f2; color: var(--danger); }
  .btn-icon-edit:hover { background: var(--primary-light); color: var(--primary); }

  .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .dash-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-sm); transition: transform 0.15s, box-shadow 0.15s; }
  .dash-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .dash-card .label { font-size: 12px; font-weight: 500; color: var(--muted-text); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .dash-card .value { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .dash-card .sub { font-size: 12px; color: var(--muted-text); margin-top: 2px; }
  .dash-card.accent-primary .value { color: var(--primary); }
  .dash-card.accent-success .value { color: var(--success); }
  .dash-card.accent-warning .value { color: var(--warning); }

  .form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 24px; box-shadow: var(--shadow-sm); overflow: hidden; }
  .form-header { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .form-header h2 { font-size: 14px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
  .form-header .toggle-icon { color: var(--muted-text); font-size: 14px; transition: transform 0.2s; }
  .form-header .toggle-icon.open { transform: rotate(180deg); }
  .form-body { padding: 20px 22px; display: none; }
  .form-body.open { display: block; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.name-group { position: relative; }
  .suggestions { position: absolute; top: 100%; left: 0; right: 0; z-index: 100; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); display: none; max-height: 260px; overflow-y: auto; margin-top: 2px; }
  .suggest-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid #f3f4f6; }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover { background: var(--primary-light); }
  .suggest-code { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; }
  .suggest-name { font-size: 13px; color: var(--text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .suggest-market { font-size: 11px; color: var(--muted-text); background: #f3f4f6; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.3px; }
  .form-group input, .form-group select { padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s, box-shadow 0.15s; background: #fafbfc; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: #fff; }
  .form-group input::placeholder { color: #b0b7c3; font-size: 13px; }
  .form-group select { cursor: pointer; }
  .form-actions { display: flex; align-items: flex-end; }
  .form-actions .btn { height: 38px; width: 100%; }

  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead { background: #f8fafc; }
  thead th { padding: 12px 16px; text-align: right; font-size: 11px; font-weight: 600; color: var(--muted-text); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); white-space: nowrap; position: sticky; top: 0; background: #f8fafc; }
  thead th:first-child { text-align: left; }
  thead th:last-child { text-align: center; width: 80px; }
  tbody tr { transition: background 0.1s; border-bottom: 1px solid #f3f4f6; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { padding: 14px 16px; text-align: right; white-space: nowrap; vertical-align: middle; }
  tbody td:first-child { text-align: left; }
  tbody td:last-child { text-align: center; width: 80px; }

  .stock-cell { display: flex; align-items: center; gap: 10px; }
  .stock-avatar { width: 32px; height: 32px; border-radius: 8px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .stock-info { display: flex; flex-direction: column; }
  .stock-code { font-size: 13px; font-weight: 400; color: var(--muted-text); }
  .stock-name { font-size: 14px; font-weight: 600; color: var(--text); }

  .yield-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .yield-badge.high { background: #f3f4f6; color: var(--text); }
  .yield-badge.mid { background: #f3f4f6; color: var(--text); }
  .yield-badge.low { background: #f3f4f6; color: var(--muted-text); }
  .dividend-cell { font-weight: 700; font-size: 15px; color: var(--text); }

  .cost-cell { cursor: pointer; padding: 4px 8px; margin: -4px -8px; border-radius: 4px; transition: background 0.1s; display: inline-block; }
  .cost-cell:hover { background: var(--primary-light); }
  .editable-input { width: 90px; padding: 4px 8px; border: 1.5px solid var(--primary); border-radius: 4px; font-size: 14px; font-family: inherit; text-align: right; outline: none; background: #fff; }

  .live-price { font-weight: 600; }
  .live-price.up { color: var(--danger); }
  .live-price.down { color: var(--success); }
  .live-price.unset { color: var(--muted-text); }
  .live-change { font-size: 11px; margin-left: 2px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted-text); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty p { font-size: 14px; }

  .confirm-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); animation: fadeIn 0.15s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .confirm-box { background: var(--card); border-radius: 12px; padding: 28px; max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.15); animation: slideUp 0.15s; }
  .confirm-box .confirm-icon { width: 44px; height: 44px; border-radius: 50%; background: #fef2f2; color: var(--danger); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 16px; }
  .confirm-box p { font-size: 15px; color: var(--text); margin-bottom: 4px; line-height: 1.6; }
  .confirm-box .sub { font-size: 13px; color: var(--muted-text); margin-bottom: 22px; }
  .confirm-box .actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { background: #f3f4f6; color: var(--text-secondary); }
  .btn-cancel:hover { background: #e5e7eb; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #dc2626; }

  .edit-box { background: var(--card); border-radius: 12px; padding: 28px; max-width: 560px; width: 92%; box-shadow: 0 20px 60px rgba(0,0,0,0.15); animation: slideUp 0.15s; max-height: 90vh; overflow-y: auto; }
  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .edit-grid .form-group input, .edit-grid .form-group select { padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; outline: none; width: 100%; transition: border-color 0.15s; background: #fafbfc; }
  .edit-grid .form-group input:focus, .edit-grid .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: #fff; }
  .edit-actions { display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid var(--border); padding-top: 20px; }
  .edit-actions .btn { height: 38px; min-width: 100px; }

  .trade-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .trade-row input { padding: 7px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; outline: none; width: 100%; transition: border-color 0.15s; background: #fafbfc; }
  .trade-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: #fff; }
  .trade-row .tr-del { width: 28px; height: 28px; flex-shrink: 0; }
  .trade-label { font-size: 11px; color: var(--muted-text); flex-shrink: 0; min-width: 36px; text-align: right; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 10px 22px; border-radius: 8px; font-size: 14px; z-index: 300; box-shadow: 0 4px 20px rgba(0,0,0,0.2); animation: slideUp 0.2s; opacity: 0; transition: opacity 0.2s; }
  .toast.show { opacity: 1; }
  .toast.error { background: #dc2626; }

  @media (max-width: 700px) {
    .container { padding: 16px; }
    .header-inner { padding: 16px 20px; }
    .header h1 { font-size: 17px; }
    .dash-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .dash-card { padding: 14px 16px; }
    .dash-card .value { font-size: 18px; }
    .form-grid { grid-template-columns: repeat(2, 1fr); }
    .form-actions { grid-column: span 2; }
    tbody td { padding: 12px 12px; font-size: 13px; }
    thead th { padding: 10px 12px; font-size: 10px; }
    .stock-avatar { width: 28px; height: 28px; font-size: 11px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>
      <span class="logo-icon">📈</span>
      收息日记
      <span class="header-sub">Portfolio</span>
    </h1>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="refreshPrices()" id="refreshBtn">⟳ 刷新行情</button>
      <button class="btn btn-ghost" onclick="toggleForm()">＋ 添加</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="dash-grid">
    <div class="dash-card accent-primary">
      <div class="label">📦 持有股票</div>
      <div class="value" id="dashCount">0</div>
      <div class="sub">只</div>
    </div>
    <div class="dash-card accent-primary">
      <div class="label">💰 总成本</div>
      <div class="value" id="dashCost">¥0</div>
      <div class="sub" id="dashShares">0 股</div>
    </div>
    <div class="dash-card" id="dashMvCard">
      <div class="label">🏷️ 总市值</div>
      <div class="value" id="dashMv">¥0</div>
      <div class="sub">按最新价计算</div>
    </div>
    <div class="dash-card" id="dashPnlCard">
      <div class="label">📊 总盈亏</div>
      <div class="value" id="dashPnl">¥0</div>
      <div class="sub" id="dashPnlPct">—</div>
    </div>
    <div class="dash-card" id="dashDailyPnlCard">
      <div class="label">📊 当日盈亏</div>
      <div class="value" id="dashDailyPnl">¥0</div>
      <div class="sub" id="dashDailyPnlSub">—</div>
    </div>
    <div class="dash-card">
      <div class="label">💵 预计年分红</div>
      <div class="value" id="dashDividend">¥0</div>
      <div class="sub">年度股息收入</div>
    </div>
    <div class="dash-card accent-warning">
      <div class="label">📊 综合股息率</div>
      <div class="value" id="dashYield">0%</div>
      <div class="sub">分红 / 成本</div>
    </div>
  </div>

  <!-- Form -->
  <div class="form-card" id="formCard">
    <div class="form-header" onclick="toggleForm()">
      <h2><span>📝</span> 新增持仓</h2>
      <span class="toggle-icon open" id="formToggle">▼</span>
    </div>
    <div class="form-body open" id="formBody">
      <div class="form-grid">
        <div class="form-group">
          <label for="code">🔖 股票代码</label>
          <input id="code" placeholder="例 AAPL / 600519" autocomplete="off">
        </div>
        <div class="form-group name-group">
          <label for="name">🏢 名称</label>
          <input id="name" placeholder="输入名称搜索" autocomplete="off">
          <div class="suggestions" id="stockSuggestions"></div>
        </div>
        <div class="form-group">
          <label for="shares">🔢 买入股数</label>
          <input id="shares" type="number" step="1" placeholder="100">
        </div>
        <div class="form-group">
          <label for="costPrice">🏷️ 买入价格</label>
          <input id="costPrice" type="number" step="0.01" placeholder="150.00">
        </div>
        <div class="form-group">
          <label for="currentPrice">📡 当前价</label>
          <input id="currentPrice" type="number" step="0.01" placeholder="添加后将自动获取">
        </div>
        <div class="form-group">
          <label for="dividendPerShare">💸 每股分红</label>
          <input id="dividendPerShare" type="number" step="0.001" placeholder="0.96">
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="addStock()" style="height:38px">＋ 添加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>📋 股票</th>
            <th>🏷️ 成本均价</th>
            <th>📡 最新价</th>
            <th>📦 持股</th>
            <th>💸 每股分红</th>
            <th>📈 股息率</th>
            <th>📊 成本息率</th>
            <th>🎯 预计分红</th>
            <th>📊 当日盈亏</th>
            <th>📊 总盈亏</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="stockTableBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty">
      <div class="icon">📭</div>
      <p>还没有持仓数据，点击右上角添加第一只股票</p>
    </div>
  </div>
</div>

<!-- ── Edit Modal ── -->
<div class="confirm-overlay" id="editOverlay" style="display:none">
  <div class="edit-box">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <span style="font-size:20px">✏️</span>
      <span style="font-size:16px;font-weight:600">编辑持仓</span>
    </div>
    <div class="edit-grid">
      <div class="form-group">
        <label>🔖 代码</label>
        <input id="editCode" placeholder="600519">
      </div>
      <div class="form-group name-group">
        <label>🏢 名称</label>
        <input id="editName" placeholder="贵州茅台">
        <div class="suggestions" id="editStockSuggestions"></div>
      </div>
      <div class="form-group">
        <label>📡 当前价</label>
        <input id="editCurrentPrice" type="number" step="0.01">
      </div>
      <div class="form-group">
        <label>💸 每股分红</label>
        <input id="editDividend" type="number" step="0.001">
      </div>
    </div>

    <!-- Trade records -->
    <div style="border-top:1px solid var(--border);padding-top:16px;margin:16px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:14px;font-weight:600;color:var(--text-secondary)">📋 交易记录</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-secondary" onclick="addTradeRow('buy')" style="font-size:12px;padding:4px 12px">＋ 买入</button>
          <button class="btn btn-secondary" onclick="addTradeRow('sell')" style="font-size:12px;padding:4px 12px">－ 卖出</button>
        </div>
      </div>
      <div id="tradeList"></div>
      <div id="tradeSummary" style="display:none;font-size:13px;padding:10px 14px;background:#f9fafb;border-radius:6px;margin-top:8px;gap:16px;flex-wrap:wrap"></div>
    </div>

    <div class="edit-actions">
      <button class="btn btn-cancel" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存修改</button>
    </div>
  </div>
</div>

<!-- ── Trade History Modal ── -->
<div class="confirm-overlay" id="tradeOverlay" style="display:none">
  <div class="edit-box" style="max-width:480px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <span style="font-size:20px">📋</span>
      <span style="font-size:16px;font-weight:600" id="tradeModalTitle">交易记录</span>
    </div>
    <div id="tradeHistoryContent" style="font-size:14px;color:var(--text-secondary)"></div>
    <div style="margin-top:20px;text-align:right">
      <button class="btn btn-cancel" onclick="closeTradeModal()">关闭</button>
    </div>
  </div>
</div>

<script>
// ── Error catcher ──
window.onerror = function(msg, url, line, col, err) {
  const d = document.getElementById('errbox') || (function(){
    const e = document.createElement('div'); e.id = 'errbox';
    e.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#c00;color:#fff;padding:20px;z-index:9999;font:14px/1.5 monospace;white-space:pre-wrap';
    document.body.appendChild(e); return e;
  })();
  d.textContent += 'JS Error: ' + msg + ' (' + line + ':' + col + ')\n';
  d.textContent += (err && err.stack) ? err.stack : '';
};

const STORAGE_KEY = 'interest_dividend_tracker';
const MARKET_NAMES = { us: '🇺🇸 美股', sh: '🇨🇳 沪市', sz: '🇨🇳 深市', hk: '🇭🇰 港股' };
let stocks = [];
let livePrices = {};
let liveChanges = {};
let fetching = false;

// ── Load / Save ──

function load() {
  try { stocks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { stocks = []; }
  // Migrate legacy stocks without trades
  for (const s of stocks) {
    if (!s.trades && s.shares > 0 && s.costPrice > 0) {
      s.trades = [{ type: 'buy', shares: s.shares, price: s.costPrice }];
    }
  }
  render();
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(stocks)); }

// ── Calculations ──

function calcFromTrades(trades) {
  if (!trades || trades.length === 0) return { shares: 0, costPrice: 0, totalCost: 0 };
  let totalShares = 0, totalCost = 0;
  for (const t of trades) {
    const sh = parseInt(t.shares) || 0;
    const pr = parseFloat(t.price) || 0;
    if (t.type === 'sell') {
      const avgCost = totalShares > 0 ? totalCost / totalShares : 0;
      totalShares -= sh;
      totalCost -= sh * avgCost;
    } else {
      totalShares += sh;
      totalCost += sh * pr;
    }
  }
  return {
    shares: Math.max(0, totalShares),
    costPrice: totalShares > 0 ? totalCost / totalShares : 0,
    totalCost: Math.max(0, totalCost)
  };
}

function getStockShares(s) { return s.trades ? calcFromTrades(s.trades).shares : (s.shares || 0); }
function getStockCostPrice(s) { return s.trades ? calcFromTrades(s.trades).costPrice : (s.costPrice || 0); }
function getStockTotalCost(s) { return getStockShares(s) * getStockCostPrice(s); }

function calcYield(s) {
  const cp = s.currentPrice || 0;
  return cp ? (s.dividendPerShare || 0) / cp : 0;
}
function calcDividend(s) { return (s.dividendPerShare || 0) * getStockShares(s); }

const fm = (v) => '¥' + Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fp = (v) => (v * 100).toFixed(2) + '%';

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg, isError) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
}

// ── Live price ──

function fetchPrices() {
  if (fetching) return;
  const valid = stocks.filter(s => s.market && s.code);
  if (valid.length === 0) return;

  fetching = true;
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '⟳ 获取中...';
  btn.disabled = true;

  const codes = valid.map(s => s.market + s.code).join(',');
  const script = document.createElement('script');
  script.src = `https://qt.gtimg.cn/q=${codes}`;
  script.charset = 'GBK';

  const timeout = setTimeout(() => {
    script.remove(); fetching = false;
    btn.textContent = '⟳ 刷新行情'; btn.disabled = false;
    toast('行情获取超时', true);
  }, 10000);

  script.onload = () => {
    clearTimeout(timeout);
    for (const s of valid) {
      const varName = 'v_' + s.market + s.code;
      const raw = window[varName];
      if (raw && typeof raw === 'string') {
        const parts = raw.split('~');
        const price = parseFloat(parts[3]);
        const close = parseFloat(parts[4]);
        if (!isNaN(price)) {
          livePrices[s.market + s.code] = price;
          if (!isNaN(close) && close > 0) {
            liveChanges[s.market + s.code] = { change: price - close, changePct: (price - close) / close };
          }
        }
      }
      delete window[varName];
    }
    script.remove();
    fetching = false;
    btn.textContent = '⟳ 刷新行情'; btn.disabled = false;
    render();
    toast('行情已更新');
  };
  script.onerror = () => {
    clearTimeout(timeout); script.remove(); fetching = false;
    btn.textContent = '⟳ 刷新行情'; btn.disabled = false;
    toast('行情获取失败（可尝试 python3 -m http.server 8000）', true);
  };
  document.head.appendChild(script);
}
function refreshPrices() { fetchPrices(); }

// ── Add stock ──

function addStock() {
  const code = document.getElementById('code').value.trim();
  const name = document.getElementById('name').value.trim() || '?';
  const shares = parseInt(document.getElementById('shares').value) || 0;
  const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;
  let currentPrice = parseFloat(document.getElementById('currentPrice').value) || 0;
  const dividendPerShare = parseFloat(document.getElementById('dividendPerShare').value) || 0;

  if (!code) { alert('请输入股票代码'); return; }
  if (shares <= 0) { alert('买入股数必须大于 0'); return; }

  const market = detectMarket(code);
  stocks.push({ market, code, name, currentPrice, dividendPerShare, trades: [{ type: 'buy', shares, price: costPrice }] });
  save();
  render();

  setTimeout(() => { fetchPricesForStock(stocks.length - 1); }, 200);

  ['code','name','shares','costPrice','currentPrice','dividendPerShare'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('code').focus();
}

function fetchPricesForStock(index) {
  if (index < 0 || index >= stocks.length) return;
  const s = stocks[index];
  if (!s.market || !s.code) return;
  const script = document.createElement('script');
  script.src = `https://qt.gtimg.cn/q=${s.market}${s.code}`;
  script.charset = 'GBK';
  const timeout = setTimeout(() => script.remove(), 5000);
  script.onload = () => {
    clearTimeout(timeout);
    const varName = 'v_' + s.market + s.code;
    const raw = window[varName];
    if (raw && typeof raw === 'string') {
      const parts = raw.split('~');
      if (stocks[index].name === '?' && parts[1] && parts[1] !== '?') { stocks[index].name = parts[1]; }
      const price = parseFloat(parts[3]);
      if (!isNaN(price) && stocks[index].currentPrice === 0) { stocks[index].currentPrice = price; save(); }
    }
    delete window[varName]; script.remove();
    fetchPrices();
  };
  script.onerror = () => { clearTimeout(timeout); script.remove(); };
  document.head.appendChild(script);
}

  document.getElementById('formBody').classList.toggle('open');
  document.getElementById('formToggle').classList.toggle('open');
}

// ── Inline editing (kept for numeric convenience) ──
let editingIndex = -1;
function editCell(index, field, el) {
  if (editingIndex === index) return;
  editingIndex = index;
  const current = stocks[index][field] || 0;
  el.innerHTML = `<input class="editable-input" type="number" step="any" value="${current}" autofocus>`;
  const input = el.querySelector('input');
  input.focus(); input.select();
  const finish = () => {
    const val = parseFloat(input.value);
    if (!isNaN(val) && val >= 0) {
      stocks[index][field] = field === 'shares' ? Math.floor(val) : val;
      save();
    }
    editingIndex = -1;
    render();
  };
  input.onblur = finish;
  input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { editingIndex = -1; render(); } };
}

function getEditTrades() {
  const container = document.getElementById('tradeList');
  const rows = container.querySelectorAll('.trade-row');
  const trades = [];
  for (const row of rows) {
    const type = row.querySelector('.tr-type').value;
    const shares = parseInt(row.querySelector('.tr-shares').value) || 0;
    const price = parseFloat(row.querySelector('.tr-price').value) || 0;
    if (shares > 0 && price > 0) trades.push({ type, shares, price });
  }
  return trades;
}

    const isSell = t.type === 'sell';
    const amount = (t.shares && t.price) ? (isSell ? '-¥' : '¥') + (t.shares * t.price).toLocaleString('zh-CN',{minimumFractionDigits:2}) : '';
    return `
    <div class="trade-row">
      <select class="tr-type" onchange="updateTradeSummary()" style="padding:6px 4px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;background:#fafbfc;outline:none;cursor:pointer">

      <input class="tr-shares" type="number" step="1" value="${t.shares || ''}" placeholder="100" oninput="updateTradeSummary()" onfocus="this.select()">
      <span class="trade-label">价格</span>
      <input class="tr-price" type="number" step="0.01" value="${t.price || ''}" placeholder="150.00" oninput="updateTradeSummary()" onfocus="this.select()">
      <span class="trade-label" style="min-width:60px;text-align:right;font-weight:600;color:var(--text)">${amount}</span>
      <button class="btn-icon tr-del" onclick="this.closest('.trade-row').remove();updateTradeSummary()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`;
  }).join('');
  updateTradeSummary();
}

function addTradeRow(type) {
  const container = document.getElementById('tradeList');
  const row = document.createElement('div');
  row.className = 'trade-row';
  const isSell = type === 'sell';
  row.innerHTML = `
    <select class="tr-type" onchange="updateTradeSummary()" style="padding:6px 4px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;background:#fafbfc;outline:none;cursor:pointer">
      <option value="buy" ${isSell ? '' : 'selected'}>买入</option>
      <option value="sell" ${isSell ? 'selected' : ''}>卖出</option>
    </select>
    <span class="trade-label">股数</span>
    <input class="tr-shares" type="number" step="1" placeholder="100" oninput="updateTradeSummary()">
    <span class="trade-label">价格</span>
    <input class="tr-price" type="number" step="0.01" placeholder="150.00" oninput="updateTradeSummary()">
    <span class="trade-label" style="min-width:60px"></span>
    <button class="btn-icon tr-del" onclick="this.closest('.trade-row').remove();updateTradeSummary()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
  container.appendChild(row);
  row.querySelector('.tr-shares').focus();
  updateTradeSummary();
}

function updateTradeSummary() {
  const trades = getEditTrades();
  const calc = calcFromTrades(trades);
  const el = document.getElementById('tradeSummary');
  if (calc.shares > 0) {
    const inputPrice = parseFloat(document.getElementById('editCurrentPrice').value);
    const s = stocks[editIndex];
    const price = inputPrice || (s ? livePrices[s.market + s.code] || s.currentPrice : 0) || 0;
    const mv = price * calc.shares;
    const pl = mv - calc.totalCost;
    el.style.display = 'flex';
    el.innerHTML = `
      <span>📦 <strong>${calc.shares.toLocaleString()}</strong> 股</span>
      <span>🏷️ 均价 <strong>${fm(calc.costPrice)}</strong></span>
      <span>💰 总投入 <strong>${fm(calc.totalCost)}</strong></span>
      <span style="${mv > 0 ? (pl >= 0 ? 'color:var(--danger)' : 'color:var(--success)') : ''}">📊 市值 <strong>${mv > 0 ? fm(mv) : '—'}</strong>${mv > 0 ? (pl >= 0 ? ' (+' + fm(pl) + ')' : ' (' + fm(pl) + ')') : ''}</span>`;
  } else {
    el.style.display = 'none';
  }
}

function saveEdit() {
  if (editIndex < 0 || editIndex >= stocks.length) return;
  const code = document.getElementById('editCode').value.trim();
  const name = document.getElementById('editName').value.trim();
  const currentPrice = parseFloat(document.getElementById('editCurrentPrice').value) || 0;
  const dividendPerShare = parseFloat(document.getElementById('editDividend').value) || 0;
  const trades = getEditTrades();

  if (!code) { alert('请输入股票代码'); return; }
  if (trades.length === 0) { alert('请至少添加一条交易记录'); return; }
  const calcResult = calcFromTrades(trades);
  if (calcResult.shares <= 0) { alert('持仓股数必须大于 0，请检查买入/卖出记录'); return; }

  const market = detectMarket(code);
  const oldKey = stocks[editIndex].market + stocks[editIndex].code;
  stocks[editIndex] = { market, code, name, currentPrice, dividendPerShare, trades };
  save();
  closeEditModal();
  render();
  toast('持仓已更新');

  delete livePrices[oldKey]; delete liveChanges[oldKey];
  delete livePrices[market + code]; delete liveChanges[market + code];
  setTimeout(fetchPrices, 300);
}

document.getElementById('editOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
document.querySelectorAll('#editOverlay .edit-grid input, #editOverlay .edit-grid select').forEach(inp => {
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveEdit(); });
});
document.getElementById('editCurrentPrice').addEventListener('input', updateTradeSummary);

// ── Confirm delete ──

let deleteIndex = -1;
function confirmDelete(index) {
  deleteIndex = index;
  const s = stocks[index];
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay'; overlay.id = 'confirmOverlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <div class="confirm-icon">⚠️</div>
      <p>确定删除 <strong>${escHtml(s.code)} ${escHtml(s.name)}</strong>？</p>
      <div class="sub">删除后数据不可恢复</div>
      <div class="actions">
        <button class="btn btn-cancel" onclick="cancelDelete()">取消</button>
        <button class="btn btn-danger" onclick="doDelete()">确认删除</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
function cancelDelete() { const el = document.getElementById('confirmOverlay'); if (el) el.remove(); deleteIndex = -1; }
function doDelete() {
  if (deleteIndex >= 0) {
    const s = stocks[deleteIndex];
    stocks.splice(deleteIndex, 1);
    delete livePrices[s.market + s.code]; delete liveChanges[s.market + s.code];
    save(); render();
  }
  cancelDelete();
}

// ── Auto-detect market & fill name ──

function detectMarket(code) {
  if (/[a-zA-Z]/.test(code)) return 'us';
  if (/^6\d{5}$/.test(code)) return 'sh';
  if (/^[03]\d{5}$/.test(code)) return 'sz';
  if (/^\d{1,5}$/.test(code)) return 'hk';
  return 'sh';
}

function autoDetectAndFetch() {
  const code = document.getElementById('code').value.trim();
  if (!code) return;
  document.getElementById('name').value = '';
  fetchStockName();
}

function fetchStockName() {
  const code = document.getElementById('code').value.trim();
  const nameInput = document.getElementById('name');
  if (!code || nameInput.value.trim()) return;
  const market = detectMarket(code);
  const script = document.createElement('script');
  script.src = `https://qt.gtimg.cn/q=${market}${code}`; script.charset = 'GBK';
  const timeout = setTimeout(() => script.remove(), 5000);
  script.onload = () => {
    clearTimeout(timeout);
    const varName = 'v_' + market + code;
    const raw = window[varName];
    if (raw && typeof raw === 'string') {
      const parts = raw.split('~');
      if (parts[1] && parts[1] !== '?') nameInput.value = parts[1];
    }
    delete window[varName]; script.remove();
  };
  script.onerror = () => { clearTimeout(timeout); script.remove(); };
  document.head.appendChild(script);
}

// ── Name search ──

let suggestTimer = null;

function searchByName(keyword, containerId, codeId, nameId) {
  const cb = 'suggest_' + Date.now();
  window[cb] = function(data) {
    delete window[cb];
    const container = document.getElementById(containerId);
    if (data && data.Code === 0 && data.Data && data.Data.length > 0) {
      const marketMap = { 'SH': 'sh', 'SZ': 'sz', 'HK': 'hk' };
      container.innerHTML = data.Data.map(item => {
        const m = marketMap[item.Type] || 'sh';
        return `<div class="suggest-item" data-code="${item.Code}" data-market="${m}" data-name="${item.Name}">
          <span class="suggest-code">${item.Code}</span>
          <span class="suggest-name">${escHtml(item.Name)}</span>
          <span class="suggest-market">${MARKET_NAMES[m] || m}</span>
        </div>`;
      }).join('');
      container.style.display = 'block';
      container.onclick = function(e) {
        const item = e.target.closest('.suggest-item');
        if (!item) return;
        document.getElementById(codeId).value = item.dataset.code;
        document.getElementById(nameId).value = item.dataset.name;
        container.style.display = 'none';
      };
    } else {
      container.style.display = 'none';
    }
  };
  const script = document.createElement('script');
  script.src = `https://searchadapter.eastmoney.com/api/suggest/get?input=${encodeURIComponent(keyword)}&type=14&callback=${cb}`;
  script.onerror = function() { delete window[cb]; script.remove(); if (document.getElementById(containerId)) document.getElementById(containerId).style.display = 'none'; };
  document.head.appendChild(script);
  setTimeout(() => { if (window[cb]) delete window[cb]; script.remove(); }, 8000);
}

function onNameInput() {
  clearTimeout(suggestTimer);
  const keyword = document.getElementById('name').value.trim();
  const container = document.getElementById('stockSuggestions');
  if (keyword.length < 2) { container.style.display = 'none'; return; }
  suggestTimer = setTimeout(() => searchByName(keyword, 'stockSuggestions', 'code', 'name'), 300);
}

function onEditNameInput() {
  clearTimeout(suggestTimer);
  const keyword = document.getElementById('editName').value.trim();
  const container = document.getElementById('editStockSuggestions');
  if (keyword.length < 2) { container.style.display = 'none'; return; }
  suggestTimer = setTimeout(() => searchByName(keyword, 'editStockSuggestions', 'editCode', 'editName'), 300);
}

// ── Input events ──

document.querySelectorAll('.form-grid input').forEach(inp => {
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') addStock(); });
});
document.getElementById('code').addEventListener('blur', autoDetectAndFetch);
document.getElementById('name').addEventListener('input', onNameInput);
document.getElementById('name').addEventListener('blur', function() {
  setTimeout(() => document.getElementById('stockSuggestions').style.display = 'none', 200);
});
document.getElementById('editName').addEventListener('input', onEditNameInput);
document.getElementById('editName').addEventListener('blur', function() {
  setTimeout(() => document.getElementById('editStockSuggestions').style.display = 'none', 200);
});
document.addEventListener('click', function(e) {
  ['stockSuggestions', 'editStockSuggestions'].forEach(id => {
    const container = document.getElementById(id);
    if (container && container.style.display === 'block' && !container.contains(e.target)) {
      const nameInput = id === 'stockSuggestions' ? document.getElementById('name') : document.getElementById('editName');
      if (e.target !== nameInput) container.style.display = 'none';
    }
  });
});

// ── Init ──
load();
setTimeout(fetchPrices, 500);
</script>
</body>
